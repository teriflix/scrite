<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rich Text Editor Based On Quill - Scrite</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="language" content="english">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="quill/quill.snow.css" />
    <style>
    .standalone-container {
        width: 100%
    }
    #snow-container {
        height: 250px;
        font-size: 12px;
        font-family: "Rubik"
    }
    body {
        overflow: hidden;
    }

    /* Make all editor surfaces transparent so the QML backdrop shows through */
    body, .ql-toolbar.ql-snow, .ql-container.ql-snow, .ql-editor {
        background-color: transparent;
    }

    /* Dark mode: text and icon color overrides only — no backgrounds */
    body.dark-mode {
        color: #e0e0e0;
    }
    body.dark-mode .ql-toolbar.ql-snow .ql-stroke {
        stroke: #c0c0c0;
    }
    body.dark-mode .ql-toolbar.ql-snow .ql-fill {
        fill: #c0c0c0;
    }
    body.dark-mode .ql-toolbar.ql-snow .ql-picker-label,
    body.dark-mode .ql-toolbar.ql-snow .ql-picker-label::before {
        color: #c0c0c0;
    }
    body.dark-mode .ql-toolbar.ql-snow button:hover .ql-stroke,
    body.dark-mode .ql-toolbar.ql-snow button.ql-active .ql-stroke {
        stroke: #ffffff;
    }
    body.dark-mode .ql-toolbar.ql-snow button:hover .ql-fill,
    body.dark-mode .ql-toolbar.ql-snow button.ql-active .ql-fill {
        fill: #ffffff;
    }
    body.dark-mode .ql-container.ql-snow {
        color: #e0e0e0;
    }
    body.dark-mode .ql-editor {
        color: #e0e0e0;
    }
    body.dark-mode .ql-editor.ql-blank::before {
        color: #888;
    }
    body.dark-mode .ql-snow a {
        color: #8ab4f8;
    }
    body.dark-mode .ql-tooltip {
        color: #c0c0c0;
    }
    body.dark-mode .ql-tooltip input {
        color: #e0e0e0;
    }

    /* Dark mode scrollbar (overrides OS light-mode scrollbar inside WebEngine) */
    body.dark-mode ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }
    body.dark-mode ::-webkit-scrollbar-track {
        background: transparent;
    }
    body.dark-mode ::-webkit-scrollbar-thumb {
        background-color: #555;
        border-radius: 4px;
    }
    body.dark-mode ::-webkit-scrollbar-thumb:hover {
        background-color: #777;
    }
    </style>
</head>
<body id="rte">
    <div class="standalone-container">
      <div id="toolbar-container">
          <span class="ql-formats">
            <select class="ql-font"></select>
            <select class="ql-size"></select>
          </span>
          <span class="ql-formats">
            <button class="ql-bold"></button>
            <button class="ql-italic"></button>
            <button class="ql-underline"></button>
            <button class="ql-strike"></button>
          </span>
          <span class="ql-formats">
            <select class="ql-color"></select>
            <select class="ql-background"></select>
          </span>
          <span class="ql-formats">
            <button class="ql-script" value="sub"></button>
            <button class="ql-script" value="super"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-header" value="1"></button>
            <button class="ql-header" value="2"></button>
            <button class="ql-blockquote"></button>
            <button class="ql-code-block"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-list" value="ordered"></button>
            <button class="ql-list" value="bullet"></button>
            <button class="ql-indent" value="-1"></button>
            <button class="ql-indent" value="+1"></button>
          </span>
          <span class="ql-formats">
            <select class="ql-align"></select>
          </span>
          <span class="ql-formats">
            <button class="ql-link"></button>
          </span>
          <span class="ql-formats">
            <button class="ql-clean"></button>
          </span>
        </div>
        <div id="snow-container"></div>
    </div>
    <script src="quill/quill.min.js"></script>
    <script src="qwebchannel.js"></script>
    <script>
    var quill = new Quill('#snow-container', {
        modules: {
            toolbar: '#toolbar-container',
            history: {
                delay: 2000,
                maxStack: 500,
                userOnly: true
            }
        },
        placeholder: 'Type something here...',
        theme: 'snow'
    });

    var scrite = null    
    window.onload = function() {
        new QWebChannel(qt.webChannelTransport, function(channel) {
            scrite = channel.objects.scrite

            const fontSizeUnit = scrite.fontSizeUint

            window.setInterval( () => {
                const focus = quill.hasFocus()
                scrite.focus = focus
            }, 500)

            quill.on('text-change', function(delta, oldDelta, source) {
                if(source === "user") {
                    const content = quill.getContents()
                    scrite.contentUpdated(content)
                }
            })

            document.addEventListener('click', function (e) {
                if (e.target.tagName === 'A' && e.target.classList.contains('ql-preview')) {
                    e.preventDefault()
                    var linkUrl = e.target.href
                    scrite.openUrlExternally(linkUrl)
                }
            });

            scrite.requestPlaceholderText.connect( function(text) {
                quill.root.dataset.placeholder = text
            })

            scrite.requestContentSize.connect( function(size) {
                const toolbar = document.getElementById("toolbar-container")
                var container = document.getElementById("snow-container")
                container.style.height = (size.height-toolbar.offsetHeight-10) + "px"
            })

            scrite.requestFont.connect( function(font) {
                var container = document.getElementById("snow-container")
                container.style.fontSize = font.size + fontSizeUnit
                container.style.fontFamily = font.family

                var body = document.getElementById("rte")
                body.style.fontSize = font.size + fontSizeUnit
                body.style.fontFamily = font.family
            })

            scrite.requestContent.connect( function(content) {
                if(typeof content === "object")
                    quill.setContents(content)
                else
                    quill.setText(content)
            })

            scrite.requestReadOnly.connect( function(readOnly) {
                quill.enable(!readOnly)
            })

            scrite.requestFocus.connect( function(focus) {
                if(focus)
                    quill.focus()
            })

            scrite.requestUndo.connect( function() {
                quill.history.undo()
            })

            scrite.requestRedo.connect( function() {
                quill.history.redo()
            })

            scrite.requestColorScheme.connect( function(isDark) {
                var body = document.getElementById("rte")
                if(isDark)
                    body.classList.add("dark-mode")
                else
                    body.classList.remove("dark-mode")
            })

            scrite.getInitialParameters( function(result) {
                const toolbar = document.getElementById("toolbar-container")
                var container = document.getElementById("snow-container")
                container.style.height = (result.size.height-toolbar.offsetHeight-10) + "px"
                container.style.fontSize = result.font.size + fontSizeUnit
                container.style.fontFamily = result.font.family

                var body = document.getElementById("rte")
                body.style.fontSize = result.font.size + fontSizeUnit
                body.style.fontFamily = result.font.family

                if(result.isDark)
                    body.classList.add("dark-mode")
                else
                    body.classList.remove("dark-mode")

                quill.root.dataset.placeholder = result.placeholderText
                quill.enable(!result.readOnly)

                const content = result.content
                if(typeof content === "object")
                    quill.setContents(content)
                else
                    quill.setText(content)
            })
        })
    }
    </script>
</body>
</html>
